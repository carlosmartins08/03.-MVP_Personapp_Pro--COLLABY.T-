version: "3.9"

services:
  postgres:
    container_name: personapp-postgres-dev
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: personaclinic
      POSTGRES_USER: personapp
      POSTGRES_PASSWORD: personapp-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U personapp -d personaclinic"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - personapp-postgres-data:/var/lib/postgresql/data

volumes:
  personapp-postgres-data:
